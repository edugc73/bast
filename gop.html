<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTAÇÃO DE CONTAS GOP 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.95);
            --accent: #00d2ff;
            --text: #ffffff;
            --pos: #00ff88;
            --neg: #ff4d4d;
            --border: rgba(255,255,255,0.1);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 600; font-size: 1.1rem; color: var(--accent); letter-spacing: 1px; }

        .controls select {
            background: #152545;
            color: white;
            border: 1px solid var(--accent);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Novo seletor de contas em Chips */
        .account-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #8892b0;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .chip:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--accent);
            color: var(--text);
        }

        .chip.active {
            background: var(--accent);
            color: #050a1a;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card h3 { font-size: 0.7rem; color: #8892b0; text-transform: uppercase; margin-bottom: 12px; }
        .card p { font-size: 1.6rem; font-weight: 600; margin: 0; }

        .chart-box {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            height: 380px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #status { text-align: center; font-size: 0.7rem; color: var(--accent); margin-top: 20px; opacity: 0.7; }

        @media (max-width: 600px) {
            .header-top { flex-direction: column; gap: 15px; text-align: center; }
            .card p { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-top">
            <div class="logo">PRESTAÇÃO DE CONTAS GOP 2026 - MAJ DIOGO</div>
            <div class="controls">
                <select id="mesSelect"></select>
            </div>
        </div>
        
        <div class="account-selector" id="accountSelector">
            <div class="chip active" data-value="11">CONTA 11</div>
            <div class="chip" data-value="23">CONTA 23</div>
            <div class="chip" data-value="24">CONTA 24</div>
            <div class="chip" data-value="25">CONTA 25</div>
            <div class="chip" data-value="27">CONTA 27</div>
            <div class="chip" data-value="28">CONTA 28</div>
            <div class="chip" data-value="36">CONTA 36</div>
            <div class="chip" data-value="39">CONTA 39</div>
            <div class="chip" data-value="42">CONTA 42</div>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card"><h3>Saldo Anterior</h3><p id="txtAnt">R$ 0,00</p></div>
        <div class="card"><h3>Aquisição (+)</h3><p id="txtAq">R$ 0,00</p></div>
        <div class="card"><h3>Consumo (-)</h3><p id="txtCon" style="color: var(--neg)">R$ 0,00</p></div>
        <div class="card"><h3>Saldo Atual</h3><p id="txtAtu" style="color: var(--pos)">R$ 0,00</p></div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="status">Sincronizando com Google Sheets...</div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1190920077&single=true&output=csv'; 

    let rawData = {};
    let myChart = null;
    let selectedAccount = "11";

    function splitCSV(row) {
        const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
        if (!matches) return [];
        return matches.map(val => val.replace(/^"|"$/g, '').trim());
    }

    function parseNumber(val) {
        if (!val || val === "" || val === "0") return 0;
        let clean = val.replace(/[R$\s]/g, '');
        if (clean.includes(',') && clean.includes('.')) {
            clean = clean.replace(/\./g, '').replace(',', '.');
        } else {
            clean = clean.replace(',', '.');
        }
        return parseFloat(clean) || 0;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            const colMap = { 
                "11": 1, "23": 5, "24": 9, "25": 13, "27": 17, 
                "28": 21, "36": 25, "39": 29, "42": 33 
            };
            
            const months = [];

            lines.forEach((line, i) => {
                const cols = splitCSV(line);
                if (i >= 2 && cols[0]) {
                    const mes = cols[0].toUpperCase();
                    if (!months.includes(mes)) months.push(mes);
                    
                    rawData[mes] = {};
                    
                    for (let id in colMap) {
                        const start = colMap[id];
                        const ant = parseNumber(cols[start]);
                        const aq  = parseNumber(cols[start+1]);
                        const con = parseNumber(cols[start+2]);
                        
                        rawData[mes][id] = {
                            ant: ant,
                            aq: aq,
                            con: con,
                            atu: ant + aq - con
                        };
                    }
                }
            });

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            selMes.value = "JANEIRO"; 

            updateUI();
            document.getElementById('status').innerText = "● Dados Sincronizados";
        } catch (e) {
            document.getElementById('status').innerText = "Erro ao carregar link CSV.";
        }
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        const conta = selectedAccount;
        
        if (!rawData[mes] || !rawData[mes][conta]) return;

        const d = rawData[mes][conta];
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        document.getElementById('txtAnt').innerText = f(d.ant);
        document.getElementById('txtAq').innerText = f(d.aq);
        document.getElementById('txtCon').innerText = f(d.con);
        document.getElementById('txtAtu').innerText = f(d.atu);

        updateChart(conta);
    }

    function updateChart(contaId) {
        const labels = Object.keys(rawData);
        const values = labels.map(m => rawData[m][contaId].atu);

        if (myChart) myChart.destroy();

        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Saldo Atual (R$)',
                    data: values,
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 5,
                    pointHoverRadius: 8,
                    pointBackgroundColor: '#00ff88',
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return 'Saldo: ' + context.parsed.y.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                            }
                        }
                    }
                },
                scales: {
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { color: '#8892b0', font: { size: 10 } } 
                    },
                    x: { 
                        grid: { display: false }, 
                        ticks: { color: '#8892b0', font: { size: 10 } } 
                    }
                }
            }
        });
    }

    // Lógica para os chips de conta
    document.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', function() {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            selectedAccount = this.getAttribute('data-value');
            updateUI();
        });
    });

    document.getElementById('mesSelect').onchange = updateUI;

    loadData();
</script>
</body>
</html>
