<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execução Orçamentária - SAO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.95);
            --accent: #00d2ff;
            --text: #ffffff;
            --meta: #8892b0;
            --bast: #00ff88;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--bg-card); border-radius: 15px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .img-logo { height: 60px; width: auto; }
        .titulo-header { font-weight: 600; font-size: 1.1rem; color: var(--accent); }

        .grid-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }

        .card h3 { font-size: 0.7rem; color: #8892b0; text-transform: uppercase; margin-bottom: 10px; }
        .card p { font-size: 1.5rem; font-weight: 600; margin: 0; color: var(--bast); }
        .card span { font-size: 0.8rem; color: #8892b0; }

        .content-area {
            background: var(--bg-card); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        canvas { width: 100% !important; height: 400px !important; }
        #status { text-align: center; font-size: 0.7rem; color: var(--accent); margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <img src="dom.gif" alt="Logo" class="img-logo">
            <span class="titulo-header">EXECUÇÃO ORÇAMENTÁRIA - SAO</span>
        </div>
        <div class="controls">
            <select id="mesSelect"></select>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>RP PAGO (BAST)</h3>
            <p id="txtRP">0%</p>
            <span id="metaRP">Meta: 0%</span>
        </div>
        <div class="card">
            <h3>EMPENHOS (BAST)</h3>
            <p id="txtEmp">0%</p>
            <span id="metaEmp">Meta: 0%</span>
        </div>
        <div class="card">
            <h3>LIQUIDAÇÃO (BAST)</h3>
            <p id="txtLiq">0%</p>
            <span id="metaLiq">Meta: 0%</span>
        </div>
    </div>

    <div class="content-area">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="status">Sincronizando dados...</div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=339412832&single=true&output=csv'; 
    
    let db = { meses: [], dados: {} };
    let myChart = null;

    // Lista de termos que devem ser ignorados na seleção de meses
    const ignorar = ["MESES", "CRÉDITO RECEBIDO", "LIQUIDAÇÃO", "EMPENHADOS", "EMPENHOS", "SOBRE"];

    function parsePercentage(v) {
        if (!v) return 0;
        let text = v.toString().replace(/"/g, '').replace('%', '').trim();
        let num = parseFloat(text);
        
        if (isNaN(num)) return 0;
        
        // Se o valor na planilha for decimal (ex: 0.9575 para 95.75%), multiplicamos por 100
        // Caso já esteja como 95.75, mantemos o valor original.
        return (num <= 1 && num > 0) ? num * 100 : num;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            db.meses = [];
            db.dados = {};

            for (let i = 1; i < lines.length; i++) {
                const c = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(!c[0]) continue;
                
                const mesLimpo = c[0].trim().toUpperCase();
                
                // Filtro para garantir que apenas meses reais entrem na lista
                const deveIgnorar = ignorar.some(termo => mesLimpo.includes(termo));
                if (deveIgnorar) continue;

                db.meses.push(mesLimpo);
                
                db.dados[mesLimpo] = {
                    rp_meta:   parsePercentage(c[1]),
                    rp_bast:   parsePercentage(c[2]),
                    emp_meta:  parsePercentage(c[3]),
                    emp_bast:  parsePercentage(c[4]),
                    liq_meta:  parsePercentage(c[5]),
                    liq_bast:  parsePercentage(c[6])
                };
            }

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = db.meses.map(m => `<option value="${m}">${m}</option>`).join('');
            
            updateUI();
            document.getElementById('status').innerText = "● Dados Sincronizados";
        } catch (e) {
            document.getElementById('status').innerText = "Erro ao carregar dados.";
        }
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        const info = db.dados[mes];
        if (!info) return;

        // Mostra o valor exato sem arredondamento forçado para 2 casas se houver mais precisão
        const formatar = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 4 }) + "%";
        
        document.getElementById('txtRP').innerText = formatar(info.rp_bast);
        document.getElementById('metaRP').innerText = "Meta: " + formatar(info.rp_meta);
        
        document.getElementById('txtEmp').innerText = formatar(info.emp_bast);
        document.getElementById('metaEmp').innerText = "Meta: " + formatar(info.emp_meta);
        
        document.getElementById('txtLiq').innerText = formatar(info.liq_bast);
        document.getElementById('metaLiq').innerText = "Meta: " + formatar(info.liq_meta);

        updateChart(mes);
    }

    function updateChart(mesAtu) {
        if (myChart) myChart.destroy();
        const info = db.dados[mesAtu];

        myChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: ['RP PAGO', 'EMPENHOS', 'LIQUIDAÇÃO'],
                datasets: [
                    {
                        label: 'META CARTILHA',
                        data: [info.rp_meta, info.emp_meta, info.liq_meta],
                        backgroundColor: '#8892b0',
                        borderRadius: 5
                    },
                    {
                        label: 'BAST',
                        data: [info.rp_bast, info.emp_bast, info.liq_bast],
                        backgroundColor: '#00ff88',
                        borderRadius: 5
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { labels: { color: '#ffffff', font: { family: 'Poppins' } } },
                    tooltip: { 
                        callbacks: { 
                            label: (ctx) => ctx.dataset.label + ": " + ctx.raw.toLocaleString('pt-BR') + "%" 
                        } 
                    }
                },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        max: 100,
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { color: '#8892b0', callback: (v) => v + "%" } 
                    },
                    x: { ticks: { color: '#ffffff' } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    loadData();
</script>
</body>
</html>
