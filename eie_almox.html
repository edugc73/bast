<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Almoxarifado - EIE_SSG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.95);
            --accent: #00d2ff;
            --text: #ffffff;
            --pos: #00ff88;
            --neg: #ff4d4d;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: var(--bg-card); border-radius: 15px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-weight: 600; font-size: 1.1rem; color: var(--accent); letter-spacing: 1px; }
        #nomeContaCompleto { font-size: 0.85rem; color: #8892b0; margin-top: 5px; }

        .controls select {
            background: #152545; color: white; border: 1px solid var(--accent);
            padding: 10px 15px; border-radius: 8px; cursor: pointer; margin-left: 10px;
            max-width: 300px;
        }

        .grid-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card h3 { font-size: 0.75rem; color: #8892b0; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .card p { font-size: 1.4rem; font-weight: 600; margin: 0; }
        .card .label-media { font-size: 0.7rem; color: var(--accent); display: block; margin-top: 10px; opacity: 0.8; }

        .chart-container {
            background: var(--bg-card); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #status { text-align: center; font-size: 0.7rem; color: var(--accent); margin-top: 20px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <div class="logo">ALMOXARIFADO EIE_SSG</div>
            <div id="nomeContaCompleto">Selecione uma conta</div>
        </div>
        <div class="controls">
            <select id="mesSelect"></select>
            <select id="contaSelect">
                </select>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>Aquisição no Mês</h3>
            <p id="valAquisicao">R$ 0,00</p>
            <span class="label-media" id="medAquisicao">Média: R$ 0,00</span>
        </div>
        <div class="card">
            <h3>Consumo no Mês</h3>
            <p id="valConsumo" style="color: var(--neg)">R$ 0,00</p>
            <span class="label-media" id="medConsumo">Média: R$ 0,00</span>
        </div>
        <div class="card">
            <h3>Saldo Atual</h3>
            <p id="valSaldo" style="color: var(--pos)">R$ 0,00</p>
            <span class="label-media">Posição em estoque</span>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart" style="height: 350px;"></canvas>
    </div>

    <div id="status">Conectando ao Google Sheets...</div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1945400508&single=true&output=csv'; 
    
    let db = { meses: [], contas: {}, listaContas: [] };
    let myChart = null;

    function parseVal(v) {
        if (!v) return 0;
        let text = v.toString().trim();
        let clean = text.replace(/\./g, '').replace(',', '.');
        let num = parseFloat(clean);
        return isNaN(num) ? 0 : num;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            // 1. Identificar Nomes das Contas (Linha 2 do CSV)
            const nomesContas = lines[1].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(f => f.replace(/"/g, '').trim());
            
            // Mapear colunas (cada conta ocupa 4 colunas: Saldo Ant, Aquisição, Consumo, Saldo Atual)
            db.listaContas = [];
            for (let j = 1; j < nomesContas.length; j += 4) {
                if (nomesContas[j]) {
                    db.listaContas.push({
                        id: `c_${j}`,
                        nome: nomesContas[j],
                        colIdx: j // Início do bloco da conta
                    });
                }
            }

            // 2. Preencher Select de Contas
            const selConta = document.getElementById('contaSelect');
            selConta.innerHTML = db.listaContas.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');

            // 3. Processar Dados Mensais
            db.meses = [];
            db.dados = {};

            for (let i = 3; i < lines.length; i++) {
                const c = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(f => f.replace(/"/g, '').trim());
                if(!c[0] || c[0] === "" || c[0].includes("MESES")) continue;
                
                const mes = c[0].toUpperCase();
                db.meses.push(mes);
                db.dados[mes] = {};

                db.listaContas.forEach(conta => {
                    db.dados[mes][conta.id] = {
                        anterior: parseVal(c[conta.colIdx]),
                        aquisicao: parseVal(c[conta.colIdx + 1]),
                        consumo: parseVal(c[conta.colIdx + 2]),
                        atual: parseVal(c[conta.colIdx + 3])
                    };
                });
            }

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = db.meses.map(m => `<option value="${m}">${m}</option>`).join('');
            
            updateUI();
            document.getElementById('status').innerText = "● Dados Sincronizados";
        } catch (e) {
            document.getElementById('status').innerText = "Erro ao processar planilha.";
            console.error(e);
        }
    }

    function getAverage(contaId, field) {
        let total = 0, count = 0;
        db.meses.forEach(m => {
            let val = db.dados[m][contaId][field];
            if (val > 0) { total += val; count++; }
        });
        return count > 0 ? total / count : 0;
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        const contaId = document.getElementById('contaSelect').value;
        const info = db.dados[mes][contaId];
        const contaObj = db.listaContas.find(c => c.id === contaId);
        
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        document.getElementById('nomeContaCompleto').innerText = contaObj.nome;
        document.getElementById('valAquisicao').innerText = f(info.aquisicao);
        document.getElementById('valConsumo').innerText = f(info.consumo);
        document.getElementById('valSaldo').innerText = f(info.atual);

        document.getElementById('medAquisicao').innerText = `Média: ${f(getAverage(contaId, 'aquisicao'))}`;
        document.getElementById('medConsumo').innerText = `Média: ${f(getAverage(contaId, 'consumo'))}`;

        updateChart(contaId);
    }

    function updateChart(contaId) {
        const labels = db.meses;
        const dataConsumo = labels.map(m => db.dados[m][contaId].consumo);
        const dataAquisicao = labels.map(m => db.dados[m][contaId].aquisicao);

        if (myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
            type: 'bar', // Mudança para barras para melhor visualização de estoque
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Aquisição',
                        data: dataAquisicao,
                        backgroundColor: '#00d2ff',
                        borderRadius: 5
                    },
                    {
                        label: 'Consumo',
                        data: dataConsumo,
                        backgroundColor: '#ff4d4d',
                        borderRadius: 5
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#ffffff' } } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892b0' } },
                    x: { grid: { display: false }, ticks: { color: '#8892b0' } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    document.getElementById('contaSelect').onchange = updateUI;
    loadData();
</script>
</body>
</html>
