<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Impressoras BAST</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --accent: #64ffda;
            --border: #233554;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1000px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent); font-weight: 300; letter-spacing: 2px; }

        .filter-box {
            background: var(--card-bg);
            padding: 20px; border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center; margin-bottom: 25px;
        }

        select {
            background: #0a192f; color: var(--accent);
            border: 1px solid var(--accent);
            padding: 10px 20px; border-radius: 6px;
            font-size: 1rem; width: 100%; max-width: 350px; outline: none;
        }

        .info-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg); padding: 20px;
            border-radius: 10px; border: 1px solid var(--border);
            text-align: center;
        }

        .card-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .card-value { font-size: 1.3rem; font-weight: bold; }
        .accent-val { color: var(--accent); }

        .chart-container {
            background: var(--card-bg); padding: 20px;
            border-radius: 12px; border: 1px solid var(--border);
            height: 400px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Consumo de Impressoras - BAST</h1>
        <p id="status" style="font-size: 0.8rem; color: var(--text-dim);">Carregando dados da planilha...</p>
    </header>

    <div class="filter-box">
        <label style="display:block; margin-bottom:10px; color:var(--text-dim)">SELECIONE A UNIDADE / IMPRESSORA</label>
        <select id="printerSelect" onchange="updateDashboard()">
            <option value="">Carregando impressoras...</option>
        </select>
    </div>

    <div class="info-grid">
        <div class="card"><span class="card-label">Total Impressões</span><div id="valImp" class="card-value">-</div></div>
        <div class="card"><span class="card-label">Total Valor</span><div id="valVar" class="card-value">-</div></div>
        <div class="card"><span class="card-label">Total Valor Mensal</span><div id="valFix" class="card-value">-</div></div>
        <div class="card"><span class="card-label">Soma Total (Geral)</span><div id="valTotal" class="card-value accent-val">-</div></div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1699540465&single=true&output=csv';
    
    let rows = [];
    let printers = []; // Lista de objetos {nome: string, colIndex: number}
    let chartInstance = null;

    function carregarDados() {
        Papa.parse(csvUrl, {
            download: true,
            header: false, // Lemos como matriz para lidar com os cabeçalhos duplos
            complete: (results) => {
                rows = results.data;
                const headerRow = rows[1]; // Linha onde estão os nomes das impressoras (SEC COMANDO, etc)
                
                printers = [];
                // As impressoras começam na coluna 1 (B) e pulam de 4 em 4
                for(let i = 1; i < headerRow.length; i += 4) {
                    if(headerRow[i] && headerRow[i].trim() !== "") {
                        printers.push({ nome: headerRow[i].trim(), index: i });
                    }
                }

                popularDropdown();
                document.getElementById('status').innerText = "Dados Sincronizados";
            }
        });
    }

    function popularDropdown() {
        const select = document.getElementById('printerSelect');
        select.innerHTML = '<option value="">-- Escolha uma Impressora --</option>';
        printers.forEach((p, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.textContent = p.nome;
            select.appendChild(opt);
        });
    }

    function updateDashboard() {
        const printerIdx = document.getElementById('printerSelect').value;
        if(printerIdx === "") return;

        const selectedPrinter = printers[printerIdx];
        const colStart = selectedPrinter.index;

        let totalImp = 0;
        let totalVar = 0;
        let totalFix = 0;
        
        let labels = [];
        let dataImp = [];

        // Dados começam na linha 3 (Janeiro)
        for(let i = 3; i < rows.length; i++) {
            const row = rows[i];
            if(!row[0]) continue; // Pula linhas vazias

            const mes = row[0];
            const imp = parseInt(row[colStart]) || 0;
            const vVar = parseCurrency(row[colStart + 1]);
            const vFix = parseCurrency(row[colStart + 2]);

            labels.push(mes);
            dataImp.push(imp);

            totalImp += imp;
            totalVar += vVar;
            totalFix += vFix;
        }

        // Atualizar Cards
        document.getElementById('valImp').innerText = totalImp.toLocaleString('pt-BR');
        document.getElementById('valVar').innerText = formatCurrency(totalVar);
        document.getElementById('valFix').innerText = formatCurrency(totalFix);
        document.getElementById('valTotal').innerText = formatCurrency(totalVar + totalFix);

        renderChart(labels, dataImp);
    }

    function parseCurrency(val) {
        if(!val) return 0;
        // Remove R$, pontos de milhar e troca vírgula por ponto
        return parseFloat(val.toString().replace(/[R$\s.]/g, '').replace(',', '.')) || 0;
    }

    function formatCurrency(val) {
        return val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Impressões por Mês',
                    data: data,
                    backgroundColor: '#64ffda',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: '#233554' }, ticks: { color: '#8892b0' } },
                    x: { grid: { display: false }, ticks: { color: '#8892b0' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    carregarDados();
</script>
</body>
</html>
