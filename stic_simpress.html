<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Impressoras BAST - Inteligência de Dados</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --accent: #64ffda;
            --border: #233554;
            --danger: #ff4d4d;
            --success: #64ffda;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1100px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent); font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; }
        .status-badge { font-size: 0.7rem; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }

        .filter-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            background: var(--card-bg);
            padding: 25px; border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            align-items: end;
        }

        .filter-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; color: var(--text-dim); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }

        select {
            background: #0d1b33; color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px; border-radius: 8px;
            font-size: 0.95rem; width: 100%; outline: none;
            transition: all 0.3s;
            cursor: pointer;
        }
        select:focus { border-color: var(--accent); background: #112240; }

        .info-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px; margin-bottom: 25px;
        }

        .card {
            background: var(--card-bg); padding: 20px;
            border-radius: 12px; border: 1px solid var(--border);
            position: relative; overflow: hidden;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); border-color: var(--border); }
        
        .card-label { color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 5px; font-weight: 700; }
        .card-value { font-size: 1.4rem; font-weight: 700; margin-bottom: 5px; }
        .trend { font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .trend.up { color: var(--danger); }
        .trend.down { color: var(--success); }

        .chart-box {
            background: var(--card-bg); padding: 25px;
            border-radius: 16px; border: 1px solid var(--border);
            height: 400px; width: 100%;
        }

        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr 1fr; }
            .card-value { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Consumo Impressoras BAST</h1>
        <span id="status" class="status-badge">Sincronizando...</span>
    </header>

    <div class="filter-container">
        <div class="filter-group">
            <label>1. Selecionar Equipamento</label>
            <select id="printerSelect" onchange="updateDashboard()">
                <option value="all">-- Todos os Equipamentos --</option>
            </select>
        </div>
        <div class="filter-group">
            <label>2. Mês de Referência</label>
            <select id="monthSelect" onchange="updateDashboard()"></select>
        </div>
    </div>

    <div id="dashboardContent">
        <div class="info-grid">
            <div class="card">
                <span class="card-label">Volume de Impressões</span>
                <div id="valImp" class="card-value">-</div>
                <div id="trendImp" class="trend"></div>
            </div>
            <div class="card">
                <span class="card-label">Valor Variável (Extra)</span>
                <div id="valVar" class="card-value">-</div>
                <div id="trendVar" class="trend"></div>
            </div>
            <div class="card">
                <span class="card-label">Valor Mensal (Fixo)</span>
                <div id="valFix" class="card-value">-</div>
                <div id="trendFix" class="trend"></div>
            </div>
            <div class="card" style="border-color: rgba(100, 255, 218, 0.3)">
                <span class="card-label" style="color: var(--accent)">Investimento Total</span>
                <div id="valTotal" class="card-value" style="color: var(--accent)">-</div>
                <div id="trendTotal" class="trend"></div>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1699540465&single=true&output=csv';
    
    let rows = [];
    let printers = [];
    let months = [];
    let chartInstance = null;

    function carregarDados() {
        Papa.parse(csvUrl, {
            download: true,
            header: false,
            complete: (results) => {
                rows = results.data;
                const headerRow = rows[1];
                
                printers = [];
                for(let i = 1; i < headerRow.length; i += 4) {
                    if(headerRow[i] && headerRow[i].trim() !== "") {
                        printers.push({ nome: headerRow[i].trim(), index: i });
                    }
                }

                months = [];
                for(let i = 3; i < rows.length; i++) {
                    if(rows[i][0] && rows[i][0].trim() !== "") months.push(rows[i][0]);
                }

                popularDropdowns();
                document.getElementById('status').innerText = "Dados Operacionais";
                updateDashboard();
            }
        });
    }

    function popularDropdowns() {
        const pSelect = document.getElementById('printerSelect');
        const mSelect = document.getElementById('monthSelect');
        
        // Populate Printers
        pSelect.innerHTML = '<option value="all">-- Todos os Equipamentos --</option>';
        printers.forEach((p, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.textContent = p.nome;
            pSelect.appendChild(opt);
        });

        // Populate Months
        mSelect.innerHTML = '';
        months.forEach((m, idx) => {
            const opt = document.createElement('option');
            opt.value = m;
            opt.textContent = m;
            if(idx === months.length - 1) opt.selected = true;
            mSelect.appendChild(opt);
        });
    }

    function updateDashboard() {
        const pIdx = document.getElementById('printerSelect').value;
        const selMonth = document.getElementById('monthSelect').value;
        const mIdx = months.indexOf(selMonth);

        let currentData = { imp: 0, var: 0, fix: 0, total: 0 };
        let prevData = { imp: 0, var: 0, fix: 0, total: 0 };
        let historyLabels = months;
        let historyValues = new Array(months.length).fill(0);

        if(pIdx === "all") {
            for(let i = 0; i < months.length; i++) {
                printers.forEach(p => {
                    const row = rows[i + 3];
                    const val = parseInt(row[p.index]) || 0;
                    historyValues[i] += val;
                    
                    if(i === mIdx) {
                        currentData.imp += val;
                        currentData.var += parseCurrency(row[p.index + 1]);
                        currentData.fix += parseCurrency(row[p.index + 2]);
                    }
                    if(mIdx > 0 && i === mIdx - 1) {
                        prevData.imp += val;
                        prevData.var += parseCurrency(row[p.index + 1]);
                        prevData.fix += parseCurrency(row[p.index + 2]);
                    }
                });
            }
        } else {
            const p = printers[pIdx];
            for(let i = 0; i < months.length; i++) {
                const row = rows[i + 3];
                const val = parseInt(row[p.index]) || 0;
                historyValues[i] = val;

                if(i === mIdx) {
                    currentData.imp = val;
                    currentData.var = parseCurrency(row[p.index + 1]);
                    currentData.fix = parseCurrency(row[p.index + 2]);
                }
                if(mIdx > 0 && i === mIdx - 1) {
                    prevData.imp = val;
                    prevData.var = parseCurrency(row[p.index + 1]);
                    prevData.fix = parseCurrency(row[p.index + 2]);
                }
            }
        }

        currentData.total = currentData.var + currentData.fix;
        prevData.total = prevData.var + prevData.fix;
        
        // Atualiza Cards
        document.getElementById('valImp').innerText = currentData.imp.toLocaleString('pt-BR');
        document.getElementById('valVar').innerText = formatCurrency(currentData.var);
        document.getElementById('valFix').innerText = formatCurrency(currentData.fix);
        document.getElementById('valTotal').innerText = formatCurrency(currentData.total);

        // Atualiza Tendências
        updateTrend('trendImp', currentData.imp, prevData.imp);
        updateTrend('trendVar', currentData.var, prevData.var);
        updateTrend('trendFix', currentData.fix, prevData.fix);
        updateTrend('trendTotal', currentData.total, prevData.total);

        renderChart(historyLabels, historyValues, selMonth);
    }

    function updateTrend(id, current, prev) {
        const el = document.getElementById(id);
        if(!prev || prev === 0) { el.innerHTML = ""; return; }
        
        const diff = ((current - prev) / prev) * 100;
        const icon = diff > 0 ? "▲" : (diff < 0 ? "▼" : "=");
        const cls = diff > 0 ? "up" : (diff < 0 ? "down" : "");
        
        // Para custos, queda (down) é sucesso (verde)
        el.className = `trend ${cls}`;
        el.innerHTML = `${icon} ${Math.abs(diff).toFixed(1)}% vs mês ant.`;
    }

    function parseCurrency(val) {
        if(!val) return 0;
        let clean = val.toString().replace(/[R$\s]/g, '').replace(/\./g, '').replace(',', '.');
        return parseFloat(clean) || 0;
    }

    function formatCurrency(val) {
        return val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function renderChart(labels, data, highlighted) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: labels.map(l => l === highlighted ? '#64ffda' : 'rgba(100, 255, 218, 0.1)'),
                    borderColor: '#64ffda',
                    borderWidth: 1,
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (context) => `Consumo: ${context.parsed.y} impressões`
                        }
                    }
                },
                scales: {
                    y: { grid: { color: '#233554' }, ticks: { color: '#8892b0' } },
                    x: { grid: { display: false }, ticks: { color: '#8892b0' } }
                }
            }
        });
    }

    carregarDados();
</script>
</body>
</html>
