<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Impressões - BAST</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --accent: #64ffda;
            --border: #233554;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1000px; }

        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent); font-weight: 300; letter-spacing: 2px; margin-bottom: 5px; }
        .status { font-size: 0.8rem; color: var(--text-dim); }

        /* Filtro */
        .filter-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            margin-bottom: 25px;
        }

        select {
            background: #0a192f;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 1rem;
            width: 100%;
            max-width: 300px;
            outline: none;
            cursor: pointer;
        }

        /* Cards de Informação */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--accent); }
        .card-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .card-value { font-size: 1.4rem; font-weight: bold; color: var(--text-main); }
        .total-highlight { color: var(--accent); }

        /* Gráfico */
        .chart-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            height: 400px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Monitoramento de Impressoras</h1>
        <div id="status" class="status">Sincronizando dados...</div>
    </header>

    <div class="filter-box">
        <label style="display:block; margin-bottom:10px; color:var(--text-dim)">SELECIONE A IMPRESSORA</label>
        <select id="printerSelect" onchange="updateDashboard()">
            <option value="">Carregando...</option>
        </select>
    </div>

    <div class="info-grid">
        <div class="card">
            <span class="card-label">Impressões (Total)</span>
            <div id="valImpressoes" class="card-value">-</div>
        </div>
        <div class="card">
            <span class="card-label">Valor Variável</span>
            <div id="valValor" class="card-value">-</div>
        </div>
        <div class="card">
            <span class="card-label">Valor Mensal (Fixo)</span>
            <div id="valMensal" class="card-value">-</div>
        </div>
        <div class="card" style="border-bottom: 3px solid var(--accent)">
            <span class="card-label">Total Geral</span>
            <div id="valTotal" class="card-value total-highlight">-</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="impressionChart"></canvas>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1699540465&single=true&output=csv';
    
    let rawData = [];
    let myChart = null;

    // Inicialização
    window.onload = () => {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: (results) => {
                rawData = results.data;
                initDropdown();
                document.getElementById('status').innerText = "Dados atualizados via Google Sheets";
            }
        });
    };

    function initDropdown() {
        const select = document.getElementById('printerSelect');
        // Pega o nome da coluna de impressoras (ajuste o nome se for diferente na planilha)
        const printerCol = Object.keys(rawData[0])[0]; 
        const printers = [...new Set(rawData.map(item => item[printerCol]))].filter(p => p).sort();

        select.innerHTML = '<option value="">-- Escolha uma impressora --</option>';
        printers.forEach(p => {
            let opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            select.appendChild(opt);
        });
    }

    function updateDashboard() {
        const selected = document.getElementById('printerSelect').value;
        if (!selected) return;

        // Filtra os dados da impressora selecionada
        const printerCol = Object.keys(rawData[0])[0];
        const data = rawData.filter(item => item[printerCol] === selected);

        // Cálculos
        let totalImpressoes = 0;
        let totalValor = 0;
        let totalMensal = 0;

        // Mapeamento para o gráfico (Assumindo que existe uma coluna 'MES' ou 'MÊS')
        const labels = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        const valuesByMonth = new Array(12).fill(0);

        data.forEach(item => {
            // Soma valores numéricos (removendo R$ e trocando vírgula por ponto)
            const imp = parseInt(item['IMPRESSÕES']) || 0;
            const vVar = parseMoeda(item['VALOR']);
            const vFix = parseMoeda(item['VALOR MENSAL']);

            totalImpressoes += imp;
            totalValor += vVar;
            totalMensal += vFix;

            // Lógica do gráfico (Tenta achar o mês)
            // Se a planilha tiver uma linha por mês, mapeamos aqui:
            const mesIdx = indexDoMes(item['MÊS'] || item['MES']);
            if(mesIdx !== -1) valuesByMonth[mesIdx] += imp;
        });

        // Atualiza Cards
        document.getElementById('valImpressoes').innerText = totalImpressoes.toLocaleString('pt-BR');
        document.getElementById('valValor').innerText = formatMoeda(totalValor);
        document.getElementById('valMensal').innerText = formatMoeda(totalMensal);
        document.getElementById('valTotal').innerText = formatMoeda(totalValor + totalMensal);

        renderChart(labels, valuesByMonth);
    }

    function parseMoeda(val) {
        if (!val) return 0;
        return parseFloat(val.replace('R$', '').replace(/\./g, '').replace(',', '.').trim()) || 0;
    }

    function formatMoeda(val) {
        return val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function indexDoMes(mes) {
        if(!mes) return -1;
        const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
        const m = mes.toLowerCase().trim();
        return meses.findIndex(item => m.includes(item) || item.includes(m));
    }

    function renderChart(labels, dataValues) {
        const ctx = document.getElementById('impressionChart').getContext('2d');
        
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Volume de Impressões',
                    data: dataValues,
                    backgroundColor: '#64ffda',
                    borderRadius: 5,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: '#233554' },
                        ticks: { color: '#8892b0' }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#8892b0' }
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    }
</script>

</body>
</html>
