<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custos com Telefonia - BAST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .card-dark { background-color: #1e293b; border: 1px solid #334155; }
        .accent-blue { color: #38bdf8; }
        .bg-accent-blue { background-color: #0369a1; }
        .loader {
            border: 3px solid #1e293b;
            border-radius: 50%;
            border-top: 3px solid #38bdf8;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-extrabold text-white flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 accent-blue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    Dashboard BAST
                </h1>
                <p class="text-slate-400 text-sm font-semibold tracking-widest uppercase mt-1">Controle de Custos de Telefonia</p>
            </div>

            <!-- Botões de Seleção -->
            <div class="inline-flex bg-slate-800/50 p-1.5 rounded-2xl border border-slate-700 shadow-2xl">
                <button id="btnMovel" onclick="switchCategory('MOVIL')" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 bg-blue-600 text-white shadow-lg">
                    TELEFONIA MÓVEL
                </button>
                <button id="btnFixo" onclick="switchCategory('FIXO')" class="px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-300 text-slate-400 hover:text-white">
                    VIVO FIXO
                </button>
            </div>
        </header>

        <!-- Loading / Error States -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-400 animate-pulse">Sincronizando com a base de dados...</p>
        </div>

        <div id="mainContent" class="hidden">
            <!-- Estatísticas -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="card-dark p-6 rounded-3xl shadow-xl flex items-center gap-6">
                    <div class="bg-blue-500/10 p-4 rounded-2xl">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 accent-blue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Valor Total da Categoria</p>
                        <h2 id="totalValue" class="text-4xl font-black text-white">R$ 0,00</h2>
                    </div>
                </div>

                <div class="card-dark p-6 rounded-3xl shadow-xl flex items-center gap-6">
                    <div class="bg-emerald-500/10 p-4 rounded-2xl">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Total de Linhas</p>
                        <h2 id="totalLines" class="text-4xl font-black text-white">0</h2>
                    </div>
                </div>
            </div>

            <!-- Lista de Cartões -->
            <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                <!-- Inserido via JS -->
            </div>
        </div>

        <footer class="mt-16 text-center text-slate-500 text-[10px] uppercase tracking-[0.2em] border-t border-slate-800 pt-8">
            BAST • Atualizado em tempo real via Google Sheets API
        </footer>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1858719971&single=true&output=csv';
        
        let dataStore = { movel: [], fixo: [] };
        let currentCategory = 'MOVIL';

        function parseCSV(str) {
            const result = [];
            let row = [];
            let col = "";
            let inQuotes = false;
            for (let i = 0; i < str.length; i++) {
                const char = str[i];
                if (char === '"' && str[i+1] === '"') { col += char; i++; }
                else if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { row.push(col.trim()); col = ""; }
                else if (char === '\n' && !inQuotes) { row.push(col.trim()); result.push(row); row = []; col = ""; }
                else col += char;
            }
            if (col || row.length > 0) { row.push(col.trim()); result.push(row); }
            return result;
        }

        function cleanNumeric(val) {
            if (!val) return 0;
            const clean = val.replace(/[\r\n]+/g, ' ').replace(/[^\d.,-]/g, '');
            if (clean.includes(',') && clean.includes('.')) {
                return parseFloat(clean.replace(/\./g, '').replace(',', '.')) || 0;
            }
            return parseFloat(clean.replace(',', '.')) || 0;
        }

        async function init() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = parseCSV(text);

                dataStore.movel = [];
                dataStore.fixo = [];

                rows.forEach((row, idx) => {
                    if (idx < 3) return; // Pula cabeçalhos

                    // Telefonia Móvel (Colunas 0, 1, 2)
                    const resM = row[0];
                    if (resM && resM !== 'RESPONSÁVEL' && resM !== 'TOTAL') {
                        const val = cleanNumeric(row[2]);
                        if (val > 0) {
                            // Verifica se é uma linha real (não é tributo/imposto)
                            const isTax = resM.toUpperCase().includes('RETENÇÃO') || resM.toUpperCase().includes('TRIBUTO');
                            dataStore.movel.push({ nome: resM, linha: row[1] || 'N/A', valor: val, isLine: !isTax });
                        }
                    }

                    // Vivo Fixo (Colunas 4, 5, 6)
                    const resF = row[4];
                    if (resF && resF !== 'RESPONSÁVEL' && resF !== 'TOTAL') {
                        const val = cleanNumeric(row[6]);
                        if (val > 0) {
                            const isTax = resF.toUpperCase().includes('RETENÇÃO') || resF.toUpperCase().includes('TRIBUTO');
                            dataStore.fixo.push({ 
                                nome: resF, 
                                linha: (row[5] || 'N/A').replace(/[\r\n]+/g, ' '), 
                                valor: val,
                                isLine: !isTax
                            });
                        }
                    }
                });

                render();
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                alert('Erro ao carregar dados. Verifique a conexão.');
            }
        }

        function render() {
            const list = currentCategory === 'MOVIL' ? dataStore.movel : dataStore.fixo;
            const container = document.getElementById('cardsContainer');
            const totalDisplay = document.getElementById('totalValue');
            const linesDisplay = document.getElementById('totalLines');

            // Atualiza Botões
            document.getElementById('btnMovel').className = currentCategory === 'MOVIL' 
                ? 'px-6 py-2.5 rounded-xl text-sm font-bold transition-all bg-blue-600 text-white shadow-lg' 
                : 'px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-400 hover:text-white';
            
            document.getElementById('btnFixo').className = currentCategory === 'FIXO' 
                ? 'px-6 py-2.5 rounded-xl text-sm font-bold transition-all bg-blue-600 text-white shadow-lg' 
                : 'px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-400 hover:text-white';

            // Cálculos
            const totalValue = list.reduce((acc, curr) => acc + curr.valor, 0);
            const totalLines = list.filter(item => item.isLine).length;

            totalDisplay.innerText = totalValue.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            linesDisplay.innerText = totalLines;

            // Render Cards
            container.innerHTML = list.map(item => `
                <div class="card-dark p-5 rounded-3xl hover:border-blue-500/50 transition-all duration-300 group">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-extrabold px-2 py-1 ${item.isLine ? 'bg-blue-500/10 text-blue-400' : 'bg-slate-500/20 text-slate-400'} rounded-lg uppercase tracking-tighter">
                            ${!item.isLine ? 'Tributo' : (currentCategory === 'MOVIL' ? 'Móvel' : 'Fixo')}
                        </span>
                        <span class="text-xl font-black text-white">
                            ${item.valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
                        </span>
                    </div>
                    <h3 class="font-bold text-slate-100 uppercase text-sm mb-1 group-hover:accent-blue transition-colors leading-tight">
                        ${item.nome}
                    </h3>
                    <div class="flex items-center gap-1.5 text-slate-500 text-xs">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                        <span>${item.linha}</span>
                    </div>
                </div>
            `).join('');
        }

        function switchCategory(cat) {
            currentCategory = cat;
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
