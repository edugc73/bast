<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTAÇÃO DE CONTAS GLOG 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.95);
            --accent: #00d2ff;
            --text: #ffffff;
            --pos: #00ff88;
            --neg: #ff4d4d;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: var(--bg-card); border-radius: 15px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-weight: 600; font-size: 1.1rem; color: var(--accent); letter-spacing: 1px; }
        #nomeConta { font-size: 0.9rem; color: #8892b0; margin-top: 5px; font-weight: 300; }

        .controls select {
            background: #152545; color: white; border: 1px solid var(--accent);
            padding: 10px 15px; border-radius: 8px; cursor: pointer; margin-left: 10px;
        }

        .grid-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card h3 { font-size: 0.7rem; color: #8892b0; text-transform: uppercase; margin-bottom: 10px; }
        .card p { font-size: 1.3rem; font-weight: 600; margin: 0; }

        .content-area {
            background: var(--bg-card); padding: 25px; border-radius: 20px;
            min-height: 350px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
        }

        canvas { width: 100% !important; height: 350px !important; }

        .info-table { width: 100%; border-collapse: collapse; color: var(--text); }
        .info-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-table .label { color: var(--accent); font-weight: 600; width: 30%; }

        #status { text-align: center; font-size: 0.7rem; color: var(--accent); margin-top: 20px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <div class="logo">PRESTAÇÃO DE CONTAS GLOG 2026</div>
            <div id="nomeConta">Carregando...</div>
        </div>
        <div class="controls">
            <select id="mesSelect"></select>
            <select id="contaSelect">
                <optgroup label="Contas Financeiras">
                    <option value="05">CONTA 05</option>
                    <option value="27">CONTA 27</option>
                    <option value="28">CONTA 28</option>
                    <option value="37">CONTA 37</option>
                </optgroup>
                <optgroup label="Documentação">
                    <option value="RIMB">RIMB</option>
                    <option value="GMM">GMM</option>
                </optgroup>
            </select>
        </div>
    </header>

    <div id="financeCards" class="grid-cards">
        <div class="card"><h3>Saldo Anterior</h3><p id="txtAnt">R$ 0,00</p></div>
        <div class="card"><h3>Aquisição (+)</h3><p id="txtAq">R$ 0,00</p></div>
        <div class="card"><h3>Consumo (-)</h3><p id="txtCon" style="color: var(--neg)">R$ 0,00</p></div>
        <div class="card"><h3>Saldo Atual</h3><p id="txtAtu" style="color: var(--pos)">R$ 0,00</p></div>
    </div>

    <div class="content-area">
        <canvas id="mainChart"></canvas>
        <div id="docTableArea" style="display:none; width: 100%;">
            <table class="info-table" id="tableContent"></table>
        </div>
    </div>

    <div id="status">Sincronizando dados...</div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1190920077&single=true&output=csv'; 

    let rawData = {};
    const contaNomes = {
        "05": "EXPLOSIVOS E MUNIÇÕES", "27": "MATERIAL DE MANOBRA E PATRULHAMENTO",
        "28": "MATERIAL DE PROTEÇÃO E SEGURANÇA", "37": "SOBRESSALENTES DE ARMAMENTO",
        "RIMB": "REQUISIÇÃO INTERNA DE MATERIAL BÉLICO", "GMM": "GUIA DE MOVIMENTAÇÃO DE MATERIAL"
    };
    let myChart = null;

    // Função para tratar o CSV respeitando aspas (que protegem as vírgulas decimais)
    function splitCSV(text) {
        const result = [];
        let cur = '', inQuotes = false;
        for (let char of text) {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim());
        return result;
    }

    function parseFinance(val) {
        if (!val || val === "" || val === "0" || val.includes("NÃO")) return 0;
        // Remove pontos de milhar e converte vírgula decimal em ponto
        return parseFloat(val.replace(/\./g, '').replace(',', '.')) || 0;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            const months = [];

            // Começa em i=3 (JANEIRO)
            for (let i = 3; i < lines.length; i++) {
                const cols = splitCSV(lines[i]);
                if (!cols[0]) continue;

                const mes = cols[0].toUpperCase();
                months.push(mes);
                
                rawData[mes] = {
                    "05": { ant: parseFinance(cols[1]), aq: parseFinance(cols[2]), con: parseFinance(cols[3]), atu: parseFinance(cols[4]) },
                    "27": { ant: parseFinance(cols[5]), aq: parseFinance(cols[6]), con: parseFinance(cols[7]), atu: parseFinance(cols[8]) },
                    "28": { ant: parseFinance(cols[9]), aq: parseFinance(cols[10]), con: parseFinance(cols[11]), atu: parseFinance(cols[12]) },
                    "37": { ant: parseFinance(cols[13]), aq: parseFinance(cols[14]), con: parseFinance(cols[15]), atu: parseFinance(cols[16]) },
                    "RIMB": { numero: cols[17] || "NÃO HÁ", item: cols[18] || "NÃO HÁ", consumo: cols[19] || "0,00" },
                    "GMM": { remetente: cols[20] || "NÃO HÁ", consig: cols[21] || "NÃO HÁ", numero: cols[22] || "NÃO HÁ", material: cols[23] || "NÃO HÁ" }
                };
            }

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            
            // Força JANEIRO no início
            selMes.value = "JANEIRO";
            updateUI();
            
            document.getElementById('status').innerText = "● Sincronizado";
        } catch (e) {
            document.getElementById('status').innerText = "Erro de conexão.";
        }
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        const conta = document.getElementById('contaSelect').value;
        if (!rawData[mes]) return;
        
        const d = rawData[mes][conta];
        document.getElementById('nomeConta').innerText = contaNomes[conta];

        if (conta === "RIMB" || conta === "GMM") {
            document.getElementById('financeCards').style.display = 'none';
            document.getElementById('mainChart').style.display = 'none';
            document.getElementById('docTableArea').style.display = 'block';
            
            document.getElementById('tableContent').innerHTML = (conta === "RIMB") ? `
                <tr><td class="label">NÚMERO</td><td>${d.numero}</td></tr>
                <tr><td class="label">ITEM</td><td>${d.item}</td></tr>
                <tr><td class="label">CONSUMO</td><td>${d.consumo}</td></tr>` : `
                <tr><td class="label">REMETENTE</td><td>${d.remetente}</td></tr>
                <tr><td class="label">CONSIGNATÁRIO</td><td>${d.consig}</td></tr>
                <tr><td class="label">NÚMERO</td><td>${d.numero}</td></tr>
                <tr><td class="label">MATERIAL</td><td>${d.material}</td></tr>`;
        } else {
            document.getElementById('financeCards').style.display = 'grid';
            document.getElementById('mainChart').style.display = 'block';
            document.getElementById('docTableArea').style.display = 'none';

            const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('txtAnt').innerText = f(d.ant);
            document.getElementById('txtAq').innerText = f(d.aq);
            document.getElementById('txtCon').innerText = f(d.con);
            document.getElementById('txtAtu').innerText = f(d.atu);

            updateChart(conta);
        }
    }

    function updateChart(contaId) {
        const labels = Object.keys(rawData);
        const values = labels.map(m => rawData[m][contaId].atu);
        if (myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Saldo Atual',
                    data: values,
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#00ff88'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892b0' } },
                    x: { grid: { display: false }, ticks: { color: '#8892b0' } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    document.getElementById('contaSelect').onchange = updateUI;
    loadData();
</script>
</body>
</html>
