<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard EI_SREG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.95);
            --accent: #00d2ff;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: var(--bg-card); border-radius: 15px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 600; font-size: 1.1rem; color: var(--accent); }
        #nomeConta { font-size: 0.9rem; color: #8892b0; margin-top: 5px; }

        .controls select {
            background: #152545; color: white; border: 1px solid var(--accent);
            padding: 10px; border-radius: 8px; cursor: pointer; margin-left: 10px;
        }

        .grid-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }

        .card h3 { font-size: 0.7rem; color: #8892b0; text-transform: uppercase; margin-bottom: 10px; }
        .card p { font-size: 1.2rem; font-weight: 600; margin: 0; }

        .content-area {
            background: var(--bg-card); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        canvas { width: 100% !important; height: 380px !important; }
        #status { text-align: center; font-size: 0.7rem; color: var(--accent); margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <div class="logo">PRESTAÇÃO DE CONTAS EI_SREG</div>
            <div id="nomeConta">Carregando...</div>
        </div>
        <div class="controls">
            <select id="mesSelect"></select>
            <select id="contaSelect">
                <option value="16">CONTA 16</option>
                <option value="21">CONTA 21</option>
                <option value="22">CONTA 22</option>
            </select>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>Valor 2025</h3>
            <p id="v2025">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Média Anual 2025</h3>
            <p id="m2025">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Valor 2026</h3>
            <p id="v2026" style="color: var(--accent)">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Média Anual 2026</h3>
            <p id="m2026" style="color: var(--accent)">R$ 0,00</p>
        </div>
    </div>

    <div class="content-area">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="status">Sincronizando com Google Sheets...</div>
</div>

<script>
    // Substitua pela URL da sua planilha EI_SREG publicada como CSV
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1358588515&single=true&output=csv'; 
    
    let db = { meses: [], dados: {} };
    let myChart = null;

    function parseVal(v) {
        if (!v) return 0;
        let text = v.toString().trim();
        // Remove pontos de milhar e troca vírgula por ponto
        let clean = text.replace(/\./g, '').replace(',', '.');
        let num = parseFloat(clean);
        return isNaN(num) ? 0 : num;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            db.meses = [];
            db.dados = {};

            // O processamento começa na linha 3 (índice 2) onde começam os meses
            for (let i = 2; i < lines.length; i++) {
                const c = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(field => field.replace(/"/g, ''));
                
                if(!c[0] || c[0].trim() === "" || c[0].includes("ANO")) continue;
                
                const mes = c[0].trim().toUpperCase();
                db.meses.push(mes);
                
                // MAPEAMENTO BASEADO NA PLANILHA EI_SREG:
                // CONTA 16: R$ 2025 (Col B/1), R$ 2026 (Col C/2)
                // CONTA 21: R$ 2025 (Col G/6), R$ 2026 (Col H/7)
                // CONTA 22: R$ 2025 (Col L/11), R$ 2026 (Col M/12)
                db.dados[mes] = {
                    "16": { r25: parseVal(c[1]), r26: parseVal(c[2]) },
                    "21": { r25: parseVal(c[6]), r26: parseVal(c[7]) },
                    "22": { r25: parseVal(c[11]), r26: parseVal(c[12]) }
                };
            }

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = db.meses.map(m => `<option value="${m}">${m}</option>`).join('');
            
            updateUI();
            document.getElementById('status').innerText = "● Sincronizado";
        } catch (e) {
            console.error(e);
            document.getElementById('status').innerText = "Erro ao ler a planilha.";
        }
    }

    function getAverage(contaId, yearKey) {
        let total = 0, count = 0;
        db.meses.forEach(m => {
            let val = db.dados[m][contaId][yearKey];
            if (val > 0) { 
                total += val; 
                count++; 
            }
        });
        return count > 0 ? total / count : 0;
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        const conta = document.getElementById('contaSelect').value;
        if (!db.dados[mes]) return;

        const info = db.dados[mes][conta];
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        document.getElementById('nomeConta').innerText = `CONTA ${conta}`;
        
        document.getElementById('v2025').innerText = f(info.r25);
        document.getElementById('v2026').innerText = f(info.r26);

        document.getElementById('m2025').innerText = f(getAverage(conta, 'r25'));
        document.getElementById('m2026').innerText = f(getAverage(conta, 'r26'));

        updateChart(conta);
    }

    function updateChart(contaId) {
        const labels = db.meses;
        const d25 = labels.map(m => db.dados[m][contaId].r25);
        const d26 = labels.map(m => db.dados[m][contaId].r26);

        if (myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '2025 (R$)',
                        data: d25,
                        backgroundColor: 'rgba(255, 255, 255, 0.2)',
                        borderColor: 'rgba(255, 255, 255, 0.5)',
                        borderWidth: 1,
                        borderRadius: 5
                    },
                    {
                        label: '2026 (R$)',
                        data: d26,
                        backgroundColor: 'rgba(0, 210, 255, 0.7)',
                        borderColor: '#00d2ff',
                        borderWidth: 1,
                        borderRadius: 5
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#ffffff' } } },
                scales: {
                    y: { 
                        beginAtZero: true,
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { color: '#8892b0' } 
                    },
                    x: { ticks: { color: '#8892b0' } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    document.getElementById('contaSelect').onchange = updateUI;
    loadData();
</script>
</body>
</html>
