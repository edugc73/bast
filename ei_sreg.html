<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Registro - EI_SREG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.95);
            --accent: #00d2ff;
            --text: #ffffff;
            --pos: #00ff88;
            --neg: #ff4d4d;
            --neutral: #8892b0;
            --chip-bg: rgba(21, 37, 69, 0.8);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex; flex-direction: column; gap: 20px;
            padding: 25px; background: var(--bg-card); border-radius: 15px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        @media (min-width: 768px) {
            header { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-weight: 600; font-size: 1.1rem; color: var(--accent); letter-spacing: 1px; }
        #nomeContaCompleto { 
            font-size: 1rem; 
            font-weight: 600;
            color: #fff; 
            margin-top: 5px; 
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }

        .controls { display: flex; align-items: center; gap: 15px; }
        
        #mesSelect {
            background: #152545; color: white; border: 1px solid var(--accent);
            padding: 8px 15px; border-radius: 8px; cursor: pointer; outline: none;
        }

        /* Container de Chips */
        .chips-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 8px;
            margin-bottom: 25px;
            padding: 5px;
        }

        .chip {
            background: var(--chip-bg);
            color: var(--neutral);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .chip:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .chip.active {
            background: var(--accent);
            color: var(--bg-body);
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(0, 210, 255, 0.3);
        }

        .grid-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card h3 { font-size: 0.7rem; color: var(--neutral); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .card p { font-size: 1.4rem; font-weight: 600; margin: 0; }
        .card .label-media { font-size: 0.65rem; color: var(--accent); display: block; margin-top: 10px; opacity: 0.8; }

        .chart-container {
            background: var(--bg-card); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        #status { text-align: center; font-size: 0.7rem; color: var(--accent); padding-bottom: 20px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <div class="logo">EI_SREG • GESTÃO DE ESTOQUE</div>
            <div id="nomeContaCompleto">Carregando dados...</div>
        </div>
        <div class="controls">
            <label style="font-size: 0.8rem; color: var(--neutral)">Referência:</label>
            <select id="mesSelect"></select>
        </div>
    </header>

    <div class="chips-container" id="chipsContainer"></div>

    <div class="grid-cards">
        <div class="card">
            <h3>Saldo Anterior</h3>
            <p id="valAnterior" style="color: var(--neutral)">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Aquisição</h3>
            <p id="valAquisicao">R$ 0,00</p>
            <span class="label-media" id="medAquisicao">Média: R$ 0,00</span>
        </div>
        <div class="card">
            <h3>Consumo</h3>
            <p id="valConsumo" style="color: var(--neg)">R$ 0,00</p>
            <span class="label-media" id="medConsumo">Média: R$ 0,00</span>
        </div>
        <div class="card">
            <h3>Saldo Atual</h3>
            <p id="valSaldo" style="color: var(--pos)">R$ 0,00</p>
            <span class="label-media">Estoque Atualizado</span>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart" style="height: 350px;"></canvas>
    </div>

    <div id="status">Sincronizando...</div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1945400508&single=true&output=csv'; 
    
    let db = { meses: [], dados: {}, listaContas: [] };
    let myChart = null;
    let selectedContaId = null;

    function parseVal(v) {
        if (!v) return 0;
        let text = v.toString().trim();
        let clean = text.replace(/\./g, '').replace(',', '.');
        let num = parseFloat(clean);
        return isNaN(num) ? 0 : num;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            // Referências (Linha 1 da Planilha)
            const refsContas = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(f => f.replace(/"/g, '').trim());
            // Nomes Completos (Linha 2 da Planilha)
            const nomesContas = lines[1].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(f => f.replace(/"/g, '').trim());
            
            db.listaContas = [];
            // Itera pelas colunas (pula a primeira de meses e pega de 4 em 4)
            for (let j = 1; j < nomesContas.length; j += 4) {
                if (nomesContas[j]) {
                    db.listaContas.push({ 
                        id: `c_${j}`, 
                        nome: nomesContas[j], 
                        ref: refsContas[j] || `CONTA ${(j+3)/4}`, // Fallback caso a primeira linha esteja vazia
                        colIdx: j 
                    });
                }
            }

            renderChips();

            db.meses = [];
            db.dados = {};

            // Processamento dos dados mensais (Linha 4 em diante)
            for (let i = 3; i < lines.length; i++) {
                const c = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(f => f.replace(/"/g, '').trim());
                if(!c[0] || c[0] === "" || c[0].toUpperCase().includes("MESES")) continue;
                
                const mes = c[0].toUpperCase();
                db.meses.push(mes);
                db.dados[mes] = {};

                db.listaContas.forEach(conta => {
                    db.dados[mes][conta.id] = {
                        anterior: parseVal(c[conta.colIdx]),
                        aquisicao: parseVal(c[conta.colIdx + 1]),
                        consumo: parseVal(c[conta.colIdx + 2]),
                        atual: parseVal(c[conta.colIdx + 3])
                    };
                });
            }

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = db.meses.map(m => `<option value="${m}">${m}</option>`).join('');
            
            if (db.listaContas.length > 0) {
                selectConta(db.listaContas[0].id);
            }
            
            document.getElementById('status').innerText = "● Sincronizado com a Planilha";
        } catch (e) {
            console.error(e);
            document.getElementById('status').innerText = "Erro ao ler a planilha.";
        }
    }

    function renderChips() {
        const container = document.getElementById('chipsContainer');
        container.innerHTML = db.listaContas.map(conta => {
            return `<div class="chip" id="chip-${conta.id}" onclick="selectConta('${conta.id}')">${conta.ref}</div>`;
        }).join('');
    }

    function selectConta(id) {
        if (selectedContaId) {
            document.getElementById(`chip-${selectedContaId}`)?.classList.remove('active');
        }
        selectedContaId = id;
        document.getElementById(`chip-${id}`)?.classList.add('active');
        updateUI();
    }

    function getAverage(contaId, field) {
        let total = 0, count = 0;
        db.meses.forEach(m => {
            let val = db.dados[m][contaId][field];
            if (val > 0) { total += val; count++; }
        });
        return count > 0 ? total / count : 0;
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        const contaId = selectedContaId;
        if (!mes || !contaId || !db.dados[mes] || !db.dados[mes][contaId]) return;

        const info = db.dados[mes][contaId];
        const contaObj = db.listaContas.find(c => c.id === contaId);
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        // Exibe o nome completo no cabeçalho para o gestor saber o que é a conta
        document.getElementById('nomeContaCompleto').innerText = contaObj.nome;
        
        document.getElementById('valAnterior').innerText = f(info.anterior);
        document.getElementById('valAquisicao').innerText = f(info.aquisicao);
        document.getElementById('valConsumo').innerText = f(info.consumo);
        document.getElementById('valSaldo').innerText = f(info.atual);

        document.getElementById('medAquisicao').innerText = `Média: ${f(getAverage(contaId, 'aquisicao'))}`;
        document.getElementById('medConsumo').innerText = `Média: ${f(getAverage(contaId, 'consumo'))}`;

        updateChart(contaId);
    }

    function updateChart(contaId) {
        const labels = db.meses;
        const dConsumo = labels.map(m => db.dados[m][contaId].consumo);
        const dAquisicao = labels.map(m => db.dados[m][contaId].aquisicao);

        if (myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Aquisição', data: dAquisicao, backgroundColor: '#00d2ff', borderRadius: 4 },
                    { label: 'Consumo', data: dConsumo, backgroundColor: '#ff4d4d', borderRadius: 4 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { position: 'bottom', labels: { color: '#ffffff', font: { family: 'Poppins', size: 11 } } } 
                },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892b0', font: { size: 10 } } },
                    x: { grid: { display: false }, ticks: { color: '#8892b0', font: { size: 10 } } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    window.onload = loadData;
</script>
</body>
</html>
