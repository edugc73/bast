<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado - STIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.95);
            --accent: #00d2ff;
            --text: #ffffff;
            --pos: #00ff88;
            --neg: #ff4d4d;
            --chip-bg: #152545;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex; flex-direction: column; gap: 20px;
            padding: 20px; background: var(--bg-card); border-radius: 15px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        @media (min-width: 768px) {
            header { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        .logo { font-weight: 600; font-size: 1.1rem; color: var(--accent); }
        #nomeConta { font-size: 0.9rem; color: #8892b0; margin-top: 5px; }

        .controls { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }

        /* Estilização do Select de Mês */
        #mesSelect {
            background: var(--chip-bg); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 12px; border-radius: 8px; cursor: pointer; outline: none;
            transition: border-color 0.3s;
        }
        #mesSelect:hover { border-color: var(--accent); }

        /* Interface de Chips */
        .chip-container { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .chip {
            background: var(--chip-bg);
            color: #8892b0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            user-select: none;
            white-space: nowrap;
        }

        .chip:hover {
            background: rgba(0, 210, 255, 0.1);
            color: var(--text);
            border-color: rgba(0, 210, 255, 0.3);
        }

        .chip.active {
            background: var(--accent);
            color: var(--bg-body);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        /* Resto do Layout */
        .grid-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }

        .card h3 { font-size: 0.7rem; color: #8892b0; text-transform: uppercase; margin-bottom: 10px; }
        .card p { font-size: 1.2rem; font-weight: 600; margin: 0; }

        .content-area {
            background: var(--bg-card); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        canvas { width: 100% !important; height: 380px !important; }
        #status { text-align: center; font-size: 0.7rem; color: var(--accent); margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <div class="logo">CONTROLE DE MATERIAIS STIC</div>
            <div id="nomeConta">Carregando...</div>
        </div>
        
        <div class="controls">
            <select id="mesSelect"></select>
            <div class="chip-container" id="contaChips">
                <div class="chip active" data-value="17">CONTA 17</div>
                <div class="chip" data-value="26">CONTA 26</div>
                <div class="chip" data-value="38">CONTA 38</div>
            </div>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>Saldo Anterior</h3>
            <p id="txtAnt">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Aquisição</h3>
            <p id="txtAquis" style="color: var(--pos)">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Consumo</h3>
            <p id="txtCons" style="color: var(--neg)">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Saldo Atual</h3>
            <p id="txtAtu" style="color: var(--accent)">R$ 0,00</p>
        </div>
    </div>

    <div class="content-area">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="status">Sincronizando...</div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=444831142&single=true&output=csv'; 
    
    let db = { meses: [], dados: {} };
    let myChart = null;
    let selectedConta = "17";

    function parseVal(v) {
        if (!v) return 0;
        let text = v.toString().trim();
        let clean = text.replace(/\./g, '').replace(',', '.');
        let num = parseFloat(clean);
        return isNaN(num) ? 0 : num;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            db.meses = [];
            db.dados = {};

            for (let i = 3; i < lines.length; i++) {
                const c = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(field => field.replace(/"/g, ''));
                if(!c[0] || c[0].trim() === "") continue;
                
                const mes = c[0].trim().toUpperCase();
                db.meses.push(mes);
                
                db.dados[mes] = {
                    "17": { ant: parseVal(c[1]), aq: parseVal(c[2]), con: parseVal(c[3]), atu: parseVal(c[4]), label: "Processamento de Dados" },
                    "26": { ant: parseVal(c[5]), aq: parseVal(c[6]), con: parseVal(c[7]), atu: parseVal(c[8]), label: "Elétrico e Eletrônico" },
                    "38": { ant: parseVal(c[9]), aq: parseVal(c[10]), con: parseVal(c[11]), atu: parseVal(c[12]), label: "Suprimento de Proteção ao Voo" }
                };
            }

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = db.meses.map(m => `<option value="${m}">${m}</option>`).join('');
            
            // Define o último mês como padrão se disponível
            if(db.meses.length > 0) selMes.value = db.meses[db.meses.length - 1];

            initChips();
            updateUI();
            document.getElementById('status').innerText = "● Sincronizado";
        } catch (e) {
            console.error(e);
            document.getElementById('status').innerText = "Erro ao carregar dados.";
        }
    }

    function initChips() {
        const chips = document.querySelectorAll('.chip');
        chips.forEach(chip => {
            chip.onclick = () => {
                chips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                selectedConta = chip.getAttribute('data-value');
                updateUI();
            };
        });
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        if (!db.dados[mes]) return;

        const info = db.dados[mes][selectedConta];
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        document.getElementById('nomeConta').innerText = `Conta ${selectedConta} - ${info.label}`;
        document.getElementById('txtAnt').innerText = f(info.ant);
        document.getElementById('txtAquis').innerText = f(info.aq);
        document.getElementById('txtCons').innerText = f(info.con);
        document.getElementById('txtAtu').innerText = f(info.atu);

        updateChart(selectedConta);
    }

    function updateChart(contaId) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: db.meses,
                datasets: [
                    {
                        label: 'Aquisição (R$)',
                        data: db.meses.map(m => db.dados[m][contaId].aq),
                        backgroundColor: '#00ff88',
                        borderRadius: 5
                    },
                    {
                        label: 'Consumo (R$)',
                        data: db.meses.map(m => db.dados[m][contaId].con),
                        backgroundColor: '#ff4d4d',
                        borderRadius: 5
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { labels: { color: '#ffffff', font: { family: 'Poppins' } } },
                    tooltip: {
                        callbacks: {
                            label: (context) => {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                if (context.parsed.y !== null) {
                                    label += new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(context.parsed.y);
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { color: '#8892b0', font: { size: 10 } } 
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#8892b0', font: { size: 10 } } 
                    }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    loadData();
</script>
</body>
</html>
