<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado - STIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #020617;
            --bg-card: rgba(15, 23, 42, 0.8);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --pos: #10b981;
            --neg: #f43f5e;
            --chip-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px;
            background: 
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
                #020617;
            min-height: 100vh;
        }

        .container { max-width: 1300px; margin: 0 auto; }

        /* Header Modernizado */
        header {
            display: flex; flex-direction: column; gap: 20px;
            padding: 25px; 
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @media (min-width: 992px) {
            header { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        .logo-area .logo { 
            font-weight: 600; 
            font-size: 1.3rem; 
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--accent), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #nomeConta { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; font-weight: 300; }

        .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

        /* Select Estilizado */
        #mesSelect {
            background: var(--chip-bg);
            color: white;
            border: 1px solid var(--glass-border);
            padding: 10px 16px;
            border-radius: 14px;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }
        #mesSelect:hover { border-color: var(--accent); background: rgba(30, 41, 59, 1); }

        /* Chips Modernos */
        .chip-container { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .chip {
            background: var(--chip-bg);
            color: var(--text-dim);
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .chip:hover {
            color: var(--text-main);
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
        }

        .chip.active {
            background: var(--accent);
            color: #020617;
            border-color: var(--accent);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Grid de Cards */
        .grid-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card h3 { 
            font-size: 0.65rem; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            margin: 0 0 10px 0; 
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .card p { font-size: 1.5rem; font-weight: 600; margin: 0; letter-spacing: -0.5px; }

        /* Área do Gráfico */
        .content-area {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        canvas { width: 100% !important; height: 400px !important; }

        #status { 
            text-align: center; 
            font-size: 0.65rem; 
            color: var(--text-dim); 
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .dot { width: 6px; height: 6px; background: var(--pos); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--pos); }

        /* Utilitários */
        .trend-up { color: var(--pos); font-size: 0.7rem; margin-top: 5px; font-weight: 400; }
        .trend-down { color: var(--neg); font-size: 0.7rem; margin-top: 5px; font-weight: 400; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <div class="logo">STIC DASHBOARD</div>
            <div id="nomeConta">Carregando sistema...</div>
        </div>
        
        <div class="controls">
            <select id="mesSelect"></select>
            <div class="chip-container" id="contaChips">
                <div class="chip active" data-value="17">CONTA 17</div>
                <div class="chip" data-value="26">CONTA 26</div>
                <div class="chip" data-value="38">CONTA 38</div>
            </div>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card" id="cardAnt">
            <h3>Saldo Anterior</h3>
            <p id="txtAnt">R$ 0,00</p>
        </div>
        <div class="card" id="cardAquis">
            <h3>Aquisição no Mês</h3>
            <p id="txtAquis" style="color: var(--pos)">R$ 0,00</p>
            <div class="trend-up" id="trendAquis">▲ entrada</div>
        </div>
        <div class="card" id="cardCons">
            <h3>Consumo no Mês</h3>
            <p id="txtCons" style="color: var(--neg)">R$ 0,00</p>
            <div class="trend-down" id="trendCons">▼ saída</div>
        </div>
        <div class="card" id="cardAtu">
            <h3>Saldo Atual Disponível</h3>
            <p id="txtAtu" style="color: var(--accent)">R$ 0,00</p>
        </div>
    </div>

    <div class="content-area">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="status"><span class="dot"></span> Sincronizado com Base Ativa</div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=444831142&single=true&output=csv'; 
    
    let db = { meses: [], dados: {} };
    let myChart = null;
    let selectedConta = "17";

    // Formatação de Moeda
    const formatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

    function parseVal(v) {
        if (!v) return 0;
        let text = v.toString().trim();
        let clean = text.replace(/\./g, '').replace(',', '.');
        let num = parseFloat(clean);
        return isNaN(num) ? 0 : num;
    }

    // Função de animação de números
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        const range = end - start;
        const minTimer = 50;
        let stepTime = Math.abs(Math.floor(duration / range));
        stepTime = Math.max(stepTime, minTimer);
        const startTime = new Date().getTime();
        const endTime = startTime + duration;
        let timer;

        function run() {
            const now = new Date().getTime();
            const remaining = Math.max((endTime - now) / duration, 0);
            const value = end - (remaining * range);
            obj.innerText = formatter.format(value);
            if (value == end) clearInterval(timer);
        }
        timer = setInterval(run, stepTime);
        run();
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            db.meses = [];
            db.dados = {};

            for (let i = 3; i < lines.length; i++) {
                const c = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(field => field.replace(/"/g, ''));
                if(!c[0] || c[0].trim() === "") continue;
                
                const mes = c[0].trim().toUpperCase();
                db.meses.push(mes);
                
                db.dados[mes] = {
                    "17": { ant: parseVal(c[1]), aq: parseVal(c[2]), con: parseVal(c[3]), atu: parseVal(c[4]), label: "Processamento de Dados" },
                    "26": { ant: parseVal(c[5]), aq: parseVal(c[6]), con: parseVal(c[7]), atu: parseVal(c[8]), label: "Elétrico e Eletrônico" },
                    "38": { ant: parseVal(c[9]), aq: parseVal(c[10]), con: parseVal(c[11]), atu: parseVal(c[12]), label: "Suprimento de Proteção ao Voo" }
                };
            }

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = db.meses.map(m => `<option value="${m}">${m}</option>`).join('');
            
            if(db.meses.length > 0) selMes.value = db.meses[db.meses.length - 1];

            initChips();
            updateUI();
        } catch (e) {
            console.error(e);
            document.getElementById('status').innerHTML = "✖ Erro na conexão com dados";
        }
    }

    function initChips() {
        const chips = document.querySelectorAll('.chip');
        chips.forEach(chip => {
            chip.onclick = () => {
                chips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                selectedConta = chip.getAttribute('data-value');
                updateUI();
            };
        });
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        if (!db.dados[mes]) return;

        const info = db.dados[mes][selectedConta];
        
        document.getElementById('nomeConta').innerText = `Gestão de Estoque • ${info.label}`;
        
        // Atualização com efeito simples (substituído animação complexa por atualização direta para performance)
        document.getElementById('txtAnt').innerText = formatter.format(info.ant);
        document.getElementById('txtAquis').innerText = formatter.format(info.aq);
        document.getElementById('txtCons').innerText = formatter.format(info.con);
        document.getElementById('txtAtu').innerText = formatter.format(info.atu);

        updateChart(selectedConta);
    }

    function updateChart(contaId) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        
        // Criar gradientes
        const gradientPos = ctx.createLinearGradient(0, 0, 0, 400);
        gradientPos.addColorStop(0, '#10b981');
        gradientPos.addColorStop(1, 'rgba(16, 185, 129, 0.2)');

        const gradientNeg = ctx.createLinearGradient(0, 0, 0, 400);
        gradientNeg.addColorStop(0, '#f43f5e');
        gradientNeg.addColorStop(1, 'rgba(244, 63, 94, 0.2)');

        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: db.meses,
                datasets: [
                    {
                        label: 'Aquisição',
                        data: db.meses.map(m => db.dados[m][contaId].aq),
                        backgroundColor: gradientPos,
                        borderColor: '#10b981',
                        borderWidth: 1,
                        borderRadius: 8,
                        hoverBorderWidth: 2
                    },
                    {
                        label: 'Consumo',
                        data: db.meses.map(m => db.dados[m][contaId].con),
                        backgroundColor: gradientNeg,
                        borderColor: '#f43f5e',
                        borderWidth: 1,
                        borderRadius: 8,
                        hoverBorderWidth: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { 
                    legend: { 
                        position: 'top',
                        align: 'end',
                        labels: { 
                            color: '#94a3b8', 
                            boxWidth: 12,
                            usePointStyle: true,
                            pointStyle: 'circle',
                            font: { family: 'Poppins', size: 12 } 
                        } 
                    },
                    tooltip: {
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        titleFont: { size: 14, weight: 'bold' },
                        padding: 15,
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1,
                        callbacks: {
                            label: (context) => ` ${context.dataset.label}: ${formatter.format(context.parsed.y)}`
                        }
                    }
                },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false }, 
                        ticks: { color: '#64748b', font: { size: 11 } } 
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#64748b', font: { size: 11 } } 
                    }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    window.onload = loadData;
</script>
</body>
</html>
