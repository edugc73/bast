<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Consumo - EI_SREG</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.95);
            --accent: #00d2ff;
            --text: #ffffff;
            --white-alpha: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: var(--bg-card); border-radius: 15px;
            margin-bottom: 25px; border: 1px solid var(--white-alpha);
        }

        .logo { font-weight: 600; font-size: 1.1rem; color: var(--accent); }
        #nomeConta { font-size: 0.9rem; color: #8892b0; margin-top: 5px; }

        .controls select {
            background: #152545; color: white; border: 1px solid var(--accent);
            padding: 10px; border-radius: 8px; cursor: pointer; margin-left: 10px;
        }

        .grid-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card); padding: 20px; border-radius: 20px;
            border: 1px solid var(--white-alpha); text-align: center;
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-5px); }
        .card h3 { font-size: 0.65rem; color: #8892b0; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .card p { font-size: 1.4rem; font-weight: 600; margin: 0; }
        .avg-label { color: #00ff88; font-size: 0.8rem !important; }

        .content-area {
            background: var(--bg-card); padding: 25px; border-radius: 20px;
            border: 1px solid var(--white-alpha);
        }

        canvas { width: 100% !important; height: 380px !important; }
        #status { text-align: center; font-size: 0.7rem; color: var(--accent); margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <div class="logo">COMPARATIVO DE CONSUMO EI_SREG</div>
            <div id="nomeConta">Carregando...</div>
        </div>
        <div class="controls">
            <select id="mesSelect"></select>
            <select id="contaSelect">
                <option value="16">CONTA 16</option>
                <option value="21">CONTA 21</option>
                <option value="22">CONTA 22</option>
            </select>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>Consumo 2025 (Mês)</h3>
            <p id="txt2025">0.00</p>
        </div>
        <div class="card">
            <h3>Consumo 2026 (Mês)</h3>
            <p id="txt2026" style="color: var(--accent)">0.00</p>
        </div>
        <div class="card" style="border-color: rgba(255,255,255,0.2)">
            <h3>Média Anual 2025</h3>
            <p id="avg2025" class="avg-label">0.00</p>
        </div>
        <div class="card" style="border-color: rgba(0, 210, 255, 0.3)">
            <h3>Média Anual 2026</h3>
            <p id="avg2026" class="avg-label" style="color: var(--accent)">0.00</p>
        </div>
    </div>

    <div class="content-area">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="status">Sincronizando...</div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1730796342&single=true&output=csv'; 
    
    let db = { meses: [], dados: {} };
    let myChart = null;

    function parseVal(v) {
        if (!v) return 0;
        let text = v.toString().trim();
        let clean = text.replace(/\./g, '').replace(',', '.');
        let num = parseFloat(clean);
        return isNaN(num) ? 0 : num;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            db.meses = [];
            db.dados = {};

            for (let i = 2; i < lines.length; i++) {
                const c = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(field => field.replace(/"/g, ''));
                if(!c[0] || c[0].trim() === "" || c[0].includes("MESES")) continue;
                
                const mes = c[0].trim().toUpperCase();
                db.meses.push(mes);
                
                db.dados[mes] = {
                    "16": { v25: parseVal(c[1]), v26: parseVal(c[2]) },
                    "21": { v25: parseVal(c[3]), v26: parseVal(c[4]) },
                    "22": { v25: parseVal(c[5]), v26: parseVal(c[6]) }
                };
            }

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = db.meses.map(m => `<option value="${m}">${m}</option>`).join('');
            
            updateUI();
            document.getElementById('status').innerText = "● Sincronizado";
        } catch (e) {
            document.getElementById('status').innerText = "Erro ao carregar dados.";
        }
    }

    // Função para calcular média ignorando valores zerados
    function calculateYearlyAverage(contaId, yearKey) {
        let total = 0;
        let count = 0;
        db.meses.forEach(mes => {
            const val = db.dados[mes][contaId][yearKey];
            if (val > 0) {
                total += val;
                count++;
            }
        });
        return count > 0 ? (total / count).toFixed(2) : "0.00";
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        const conta = document.getElementById('contaSelect').value;
        const info = db.dados[mes][conta];
        
        document.getElementById('nomeConta').innerText = `Conta ${conta}`;
        document.getElementById('txt2025').innerText = info.v25.toFixed(2);
        document.getElementById('txt2026').innerText = info.v26.toFixed(2);

        // Atualiza os novos cards de média
        document.getElementById('avg2025').innerText = calculateYearlyAverage(conta, 'v25');
        document.getElementById('avg2026').innerText = calculateYearlyAverage(conta, 'v26');

        updateChart(conta);
    }

    function updateChart(contaId) {
        if (myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: db.meses,
                datasets: [
                    {
                        label: 'Consumo 2025',
                        data: db.meses.map(m => db.dados[m][contaId].v25),
                        backgroundColor: 'rgba(255, 255, 255, 0.2)',
                        borderRadius: 5
                    },
                    {
                        label: 'Consumo 2026',
                        data: db.meses.map(m => db.dados[m][contaId].v26),
                        backgroundColor: 'rgba(0, 210, 255, 0.7)',
                        borderRadius: 5
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#ffffff' } } },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892b0' } },
                    x: { ticks: { color: '#8892b0' } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    document.getElementById('contaSelect').onchange = updateUI;
    loadData();
</script>
</body>
</html>
