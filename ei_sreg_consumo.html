<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pro - EI_SREG</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #020617;
            --bg-card: rgba(15, 23, 42, 0.8);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: 
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(30, 58, 138, 0.2) 0%, transparent 35%),
                #020617;
        }

        .container { max-width: 1300px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .logo-area h1 { 
            margin: 0; 
            font-size: 0.75rem; 
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        #nomeConta { 
            font-size: 1.2rem; 
            color: var(--accent); 
            font-weight: 700;
            margin-top: 6px;
            line-height: 1.2;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .controls { display: flex; gap: 12px; }

        select {
            background: rgba(30, 41, 59, 0.7);
            color: white;
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            font-family: inherit;
            font-size: 0.9rem;
        }

        select:hover { border-color: var(--accent); background: rgba(30, 41, 59, 1); }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent);
            opacity: 0.5;
        }

        .card.alt::before { background: var(--text-muted); }

        .card h3 { 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            margin: 0 0 12px 0; 
            letter-spacing: 1.5px;
        }

        .card .value-wrapper { display: flex; align-items: baseline; gap: 10px; }

        .card p { font-size: 1.8rem; font-weight: 700; margin: 0; }

        .delta {
            font-size: 0.85rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
        .delta.up { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .delta.down { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        .content-area {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .chart-container { position: relative; height: 400px; width: 100%; }

        #status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 20px; text-align: center; }
            .controls { width: 100%; }
            select { flex: 1; }
            #nomeConta { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <h1>EI_SREG ANALYTICS</h1>
            <div id="nomeConta">Sincronizando descrições...</div>
        </div>
        <div class="controls">
            <select id="mesSelect"></select>
            <select id="contaSelect">
                <option value="16">CONTA 16</option>
                <option value="21">CONTA 21</option>
                <option value="22">CONTA 22</option>
            </select>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card alt">
            <h3>Consumo 2025</h3>
            <div class="value-wrapper">
                <p id="txt2025">0,00</p>
                <span class="delta" id="deltaLabel">--</span>
            </div>
        </div>
        <div class="card">
            <h3>Consumo 2026</h3>
            <div class="value-wrapper">
                <p id="txt2026" style="color: var(--accent)">0,00</p>
            </div>
        </div>
        <div class="card alt">
            <h3>Média Anual 2025</h3>
            <p id="avg2025">0,00</p>
        </div>
        <div class="card">
            <h3>Média Anual 2026</h3>
            <p id="avg2026" style="color: var(--accent)">0,00</p>
        </div>
    </div>

    <div class="content-area">
        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <div id="status-bar">
        <span class="dot"></span>
        <span id="statusText">Aguardando dados...</span>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1730796342&single=true&output=csv'; 
    
    let db = { meses: [], dados: {}, nomesContas: { "16": "", "21": "", "22": "" } };
    let myChart = null;

    function parseVal(v) {
        if (!v) return 0;
        let text = v.toString().trim();
        let clean = text.replace(/\./g, '').replace(',', '.');
        let num = parseFloat(clean);
        return isNaN(num) ? 0 : num;
    }

    // Função utilitária para tratar o split de CSV com suporte a vírgulas dentro de aspas
    function splitCSV(line) {
        return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(f => f.replace(/"/g, '').trim());
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            db.meses = [];
            db.dados = {};

            // EXTRAÇÃO DOS NOMES DAS CONTAS
            // Linha 1 (index 0) costuma ser o ID da conta (ex: CONTA 16)
            // Linha 2 (index 1) é onde agora reside a descrição (ex: MATERIAL DE EXPEDIENTE)
            const row1 = splitCSV(lines[0]);
            const row2 = splitCSV(lines[1]);
            
            // Montagem do nome: "CONTA X - DESCRIÇÃO DA LINHA 2"
            db.nomesContas["16"] = `${row1[1] || 'CONTA 16'} - ${row2[1] || 'MATERIAL DE EXPEDIENTE'}`;
            db.nomesContas["21"] = `${row1[3] || 'CONTA 21'} - ${row2[3] || 'MATERIAL DE COPA E COZINHA'}`;
            db.nomesContas["22"] = `${row1[5] || 'CONTA 22'} - ${row2[5] || 'MATERIAL DE LIMPEZA'}`;

            // Processamento dos dados mensais (inicia na linha 3 / index 2)
            for (let i = 2; i < lines.length; i++) {
                const c = splitCSV(lines[i]);
                if(!c[0] || c[0].toUpperCase().includes("MESES") || c[0] === "") continue;
                
                const mes = c[0].toUpperCase();
                db.meses.push(mes);
                
                db.dados[mes] = {
                    "16": { v25: parseVal(c[1]), v26: parseVal(c[2]) },
                    "21": { v25: parseVal(c[3]), v26: parseVal(c[4]) },
                    "22": { v25: parseVal(c[5]), v26: parseVal(c[6]) }
                };
            }

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = db.meses.map(m => `<option value="${m}">${m}</option>`).join('');
            
            updateUI();
            document.getElementById('statusText').innerText = "Dashboard Atualizado";
        } catch (e) {
            console.error(e);
            document.getElementById('statusText').innerText = "Erro na sincronização";
            document.querySelector('.dot').style.background = "var(--danger)";
        }
    }

    function calculateFullAverage(contaId, yearKey) {
        let total = 0;
        let count = 0;
        db.meses.forEach(mes => {
            const val = db.dados[mes][contaId][yearKey];
            if(val > 0) { total += val; count++; }
        });
        return count > 0 ? (total / 12).toFixed(2) : "0.00";
    }

    function updateUI() {
        if (!db.meses.length) return;

        const mes = document.getElementById('mesSelect').value;
        const conta = document.getElementById('contaSelect').value;
        const info = db.dados[mes][conta];
        
        // Atualiza o display com a concatenação da Linha 1 e Linha 2
        document.getElementById('nomeConta').innerText = db.nomesContas[conta];
        
        document.getElementById('txt2025').innerText = info.v25.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        document.getElementById('txt2026').innerText = info.v26.toLocaleString('pt-BR', {minimumFractionDigits: 2});

        const deltaLabel = document.getElementById('deltaLabel');
        if (info.v25 > 0) {
            const diff = ((info.v26 - info.v25) / info.v25) * 100;
            const isUp = diff > 0;
            deltaLabel.innerText = `${isUp ? '+' : ''}${diff.toFixed(1)}%`;
            deltaLabel.className = `delta ${isUp ? 'up' : 'down'}`;
            deltaLabel.style.display = 'inline-block';
        } else {
            deltaLabel.style.display = 'none';
        }

        document.getElementById('avg2025').innerText = parseFloat(calculateFullAverage(conta, 'v25')).toLocaleString('pt-BR', {minimumFractionDigits: 2});
        document.getElementById('avg2026').innerText = parseFloat(calculateFullAverage(conta, 'v26')).toLocaleString('pt-BR', {minimumFractionDigits: 2});

        updateChart(conta);
    }

    function updateChart(contaId) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const data25 = db.meses.map(m => db.dados[m][contaId].v25);
        const data26 = db.meses.map(m => db.dados[m][contaId].v26);
        const avg26 = calculateFullAverage(contaId, 'v26');

        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: db.meses,
                datasets: [
                    {
                        label: 'Consumo 2026',
                        data: data26,
                        backgroundColor: 'rgba(56, 189, 248, 0.8)',
                        borderRadius: 8,
                        order: 2
                    },
                    {
                        label: 'Consumo 2025',
                        data: data25,
                        backgroundColor: 'rgba(255, 255, 255, 0.1)',
                        borderRadius: 8,
                        order: 3
                    },
                    {
                        label: 'Média Anual 2026',
                        data: Array(db.meses.length).fill(avg26),
                        type: 'line',
                        borderColor: 'rgba(56, 189, 248, 0.4)',
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        order: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { color: '#94a3b8', font: { family: "'Plus Jakarta Sans'", size: 12 } }
                    }
                },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                    x: { grid: { display: false }, ticks: { color: '#64748b' } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    document.getElementById('contaSelect').onchange = updateUI;
    
    window.onload = loadData;
</script>
</body>
</html>
