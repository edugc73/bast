<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Dinâmico - Gestão de Contratos</title>
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --accent: #64ffda;
            --border: #233554;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .status-sync {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Seletor do Gestor */
        .filter-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(2, 12, 27, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        select {
            background: var(--bg-color);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
            outline: none;
        }

        /* Resultados */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .contract-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
        }

        .field {
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .value {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .value.highlight {
            color: var(--accent);
            font-weight: bold;
        }

        .loading {
            color: var(--accent);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Painel de Controle de Contratos</h1>
        <div id="syncStatus" class="status-sync">Conectando à planilha Google...</div>
    </header>

    <div class="filter-section">
        <label style="color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase;">Filtrar por Gestor</label>
        <select id="gestorSelect" onchange="renderCards()">
            <option value="">Carregando gestores...</option>
        </select>
    </div>

    <div id="results" class="results-grid"></div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1321629667&single=true&output=csv';
    
    let globalData = [];

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            const csvText = await response.text();
            
            // Converte CSV para Array de Objetos
            globalData = parseCSV(csvText);
            
            populateSelect();
            document.getElementById('syncStatus').innerText = 'Dados sincronizados com sucesso';
            renderCards();
        } catch (error) {
            console.error(error);
            document.getElementById('syncStatus').innerText = 'Erro ao carregar dados da planilha.';
        }
    }

    function parseCSV(text) {
        const lines = text.split('\n');
        const headers = lines[0].split(',');
        
        return lines.slice(1).map(line => {
            // Regex para lidar com vírgulas dentro de aspas (comum em nomes de empresas)
            const values = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if (!values) return null;
            
            return {
                gestor: values[0]?.replace(/"/g, '').trim(),
                fiscal: values[1]?.replace(/"/g, '').trim(),
                empresa: values[2]?.replace(/"/g, '').trim(),
                vigencia: values[3]?.replace(/"/g, '').trim(),
                renovacao: values[4]?.replace(/"/g, '').trim(),
                mensal: values[5]?.replace(/"/g, '').trim(),
                fatura: values[6]?.replace(/"/g, '').trim(),
                saldo: values[7]?.replace(/"/g, '').trim()
            };
        }).filter(item => item && item.gestor);
    }

    function populateSelect() {
        const select = document.getElementById('gestorSelect');
        const gestores = [...new Set(globalData.map(item => item.gestor))].sort();
        
        select.innerHTML = '<option value="">Todos os Gestores</option>';
        gestores.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g;
            opt.innerHTML = g;
            select.appendChild(opt);
        });
    }

    function renderCards() {
        const selected = document.getElementById('gestorSelect').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';

        const filtered = selected 
            ? globalData.filter(item => item.gestor === selected)
            : globalData;

        if (filtered.length === 0) {
            resultsDiv.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-dim)">Nenhum contrato encontrado.</div>';
            return;
        }

        filtered.forEach(item => {
            resultsDiv.innerHTML += `
                <div class="contract-card">
                    <div class="field">
                        <span class="label">Empresa / Objeto</span>
                        <span class="value highlight">${item.empresa}</span>
                    </div>
                    <div class="field">
                        <span class="label">Gestor / Fiscal</span>
                        <span class="value">${item.gestor} / ${item.fiscal}</span>
                    </div>
                    <div class="field">
                        <span class="label">Vigência</span>
                        <span class="value">${item.vigencia}</span>
                    </div>
                    <div class="field">
                        <span class="label">Renovação (90 dias)</span>
                        <span class="value">${item.renovacao}</span>
                    </div>
                    <div class="field">
                        <span class="label">Valor Médio Mensal</span>
                        <span class="value">${item.mensal}</span>
                    </div>
                    <div class="field">
                        <span class="label">Última Fatura</span>
                        <span class="value">${item.fatura}</span>
                    </div>
                    <div class="field" style="border-bottom: none">
                        <span class="label">Saldo Disponível</span>
                        <span class="value highlight" style="font-size: 1.1rem">R$ ${item.saldo}</span>
                    </div>
                </div>
            `;
        });
    }

    // Iniciar carregamento ao abrir
    loadData();
</script>

</body>
</html>
