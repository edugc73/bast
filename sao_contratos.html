<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard BAST - Gestão de Contratos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: #112240;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --accent: #64ffda;
            --border: #233554;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--accent);
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .filter-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(2, 12, 27, 0.5);
        }

        label {
            display: block;
            margin-bottom: 15px;
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        select {
            background: #0a192f;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 12px 20px;
            border-radius: 5px;
            width: 100%;
            max-width: 350px;
            font-size: 1rem;
            outline: none;
        }

        .results-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contract-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 8px;
            border-left: 5px solid var(--accent);
            animation: fadeIn 0.5s ease-in;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(35, 53, 84, 0.5);
        }

        .data-row:last-child { border-bottom: none; }

        .label-text {
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .value-text {
            color: var(--text-main);
            font-size: 1rem;
            text-align: right;
            max-width: 60%;
        }

        .empresa-title {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 10px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-msg { color: var(--accent); font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Gestão de Contratos BAST</h1>
        <p id="status" class="loading-msg">Carregando base de dados...</p>
    </header>

    <div class="filter-section">
        <label for="gestorSelect">FILTRAR POR GESTOR</label>
        <select id="gestorSelect" onchange="mostrarDados()">
            <option value="">Aguarde, carregando...</option>
        </select>
    </div>

    <div id="results" class="results-area">
        </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=1321629667&single=true&output=csv';
    
    let dadosPlanilha = [];

    // Função para carregar os dados via PapaParse (trata vírgulas e aspas automaticamente)
    function carregarDados() {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                dadosPlanilha = results.data;
                popularSelect();
                document.getElementById('status').innerText = "Base de dados atualizada.";
            },
            error: function() {
                document.getElementById('status').innerText = "Erro ao conectar com a planilha.";
            }
        });
    }

    function popularSelect() {
        const select = document.getElementById('gestorSelect');
        // Extrai gestores únicos e remove nulos
        const gestores = [...new Set(dadosPlanilha.map(item => item.GESTOR))].filter(g => g).sort();
        
        select.innerHTML = '<option value="">-- Selecione um Gestor --</option>';
        gestores.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g;
            opt.textContent = g;
            select.appendChild(opt);
        });
    }

    function mostrarDados() {
        const gestorSelecionado = document.getElementById('gestorSelect').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = ""; // Limpa a tela

        if (!gestorSelecionado) return;

        const filtrados = dadosPlanilha.filter(item => item.GESTOR === gestorSelecionado);

        filtrados.forEach(item => {
            const card = document.createElement('div');
            card.className = 'contract-card';
            
            card.innerHTML = `
                <div class="empresa-title">${item['EMPRESA / OBJ'] || 'N/A'}</div>
                
                <div class="data-row">
                    <span class="label-text">Fiscal</span>
                    <span class="value-text">${item['FISCAL'] || '-'}</span>
                </div>
                
                <div class="data-row">
                    <span class="label-text">Vigência</span>
                    <span class="value-text">${(item['VIGÊNCIA'] || '-').replace(/\n/g, '<br>')}</span>
                </div>
                
                <div class="data-row">
                    <span class="label-text">Renovação (90 dias)</span>
                    <span class="value-text">${(item['RENOVAÇÃO (90 DIAS)'] || '-').replace(/\n/g, '<br>')}</span>
                </div>
                
                <div class="data-row">
                    <span class="label-text">Valor Médio Mensal</span>
                    <span class="value-text">R$ ${item['VALOR MÉDIO MENSAL'] || '0,00'}</span>
                </div>
                
                <div class="data-row">
                    <span class="label-text">Última Fatura Paga</span>
                    <span class="value-text">${item['ÚLTIMA FATURA PAGA'] || '-'}</span>
                </div>
                
                <div class="data-row" style="border:none">
                    <span class="label-text" style="color:var(--accent)">Saldo</span>
                    <span class="value-text" style="color:var(--accent); font-weight:bold">R$ ${item['SALDO'] || '0,00'}</span>
                </div>
            `;
            resultsDiv.appendChild(card);
        });
    }

    // Inicia o processo
    carregarDados();
</script>

</body>
</html>
