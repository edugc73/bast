<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTENDÊNCIA - SAO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #050a1a;
            --bg-card: rgba(13, 27, 53, 0.95);
            --accent: #00d2ff;
            --text: #ffffff;
            --pos: #00ff88;
            --neg: #ff4d4d;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 20px;
            background: radial-gradient(circle at top right, #0a1f44, #050a1a);
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: var(--bg-card); border-radius: 15px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo { font-weight: 600; font-size: 1.1rem; color: var(--accent); }
        #nomeConta { font-size: 0.8rem; color: #8892b0; margin-top: 4px; }

        .controls select {
            background: #152545; color: white; border: 1px solid var(--accent);
            padding: 10px; border-radius: 8px; cursor: pointer; margin-left: 10px;
        }

        .grid-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }

        .card {
            background: var(--bg-card); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }

        .card h3 { font-size: 0.7rem; color: #8892b0; text-transform: uppercase; margin-bottom: 10px; }
        .card p { font-size: 1.2rem; font-weight: 600; margin: 0; }

        .content-area {
            background: var(--bg-card); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        canvas { width: 100% !important; height: 380px !important; }
        #status { text-align: center; font-size: 0.7rem; color: var(--accent); margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <div class="logo">INTENDÊNCIA - CRÉDITO DISPONÍVEL - SAO</div>
            <div id="nomeConta">Selecione uma conta</div>
        </div>
        <div class="controls">
            <select id="mesSelect"></select>
            <select id="contaSelect">
                <option value="C1">VIDA VEGETATIVA</option>
                <option value="C2">CONTRATOS CONTINUADOS</option>
                <option value="C3">MANUT/CONS BENS IMOVEIS</option>
                <option value="C4">PROFESP</option>
            </select>
        </div>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>Saldo Anterior</h3>
            <p id="txtAnt">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Crédito Recebido</h3>
            <p id="txtCred" style="color: var(--pos)">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Valor Utilizado</h3>
            <p id="txtUtil" style="color: var(--neg)">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Saldo Atual</h3>
            <p id="txtAtu" style="color: var(--accent)">R$ 0,00</p>
        </div>
    </div>

    <div class="content-area">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="status">Sincronizando...</div>
</div>

<script>
    // Substitua pela URL da sua planilha SAO publicada como CSV
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQvr14C0ibyiYOSg9e8bri06iwrvBhSv0bnZNBRhD_2hDIklJbWmRE5KKZAts4uDhbbdFCVvS32SPvX/pub?gid=212040633&single=true&output=csv'; 
    
    let db = { meses: [], dados: {} };
    let myChart = null;

    function parseVal(v) {
        if (!v) return 0;
        let text = v.toString().trim();
        let clean = text.replace(/\./g, '').replace(',', '.');
        let num = parseFloat(clean);
        return isNaN(num) ? 0 : num;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
            
            db.meses = [];
            db.dados = {};

            // Início na linha 4 do CSV (índice 3), onde começam os meses
            for (let i = 3; i < lines.length; i++) {
                const c = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(field => field.replace(/"/g, ''));
                if(!c[0] || c[0].trim() === "" || c[0].toUpperCase().includes("MESES")) continue;
                
                const mes = c[0].trim().toUpperCase();
                db.meses.push(mes);
                
                // Mapeamento das colunas SAO:
                // C1 (Vida Vegetativa): Ant(1), Cred(2), Util(3), Atu(4)
                // C2 (Contratos): Ant(5), Cred(6), Util(7), Atu(8)
                // C3 (Manut): Ant(9), Cred(10), Util(11), Atu(12)
                // C4 (Profesp): Ant(13), Cred(14), Util(15), Atu(16)
                db.dados[mes] = {
                    "C1": { ant: parseVal(c[1]), cre: parseVal(c[2]), uti: parseVal(c[3]), atu: parseVal(c[4]) },
                    "C2": { ant: parseVal(c[5]), cre: parseVal(c[6]), uti: parseVal(c[7]), atu: parseVal(c[8]) },
                    "C3": { ant: parseVal(c[9]), cre: parseVal(c[10]), uti: parseVal(c[11]), atu: parseVal(c[12]) },
                    "C4": { ant: parseVal(c[13]), cre: parseVal(c[14]), uti: parseVal(c[15]), atu: parseVal(c[16]) }
                };
            }

            const selMes = document.getElementById('mesSelect');
            selMes.innerHTML = db.meses.map(m => `<option value="${m}">${m}</option>`).join('');
            
            updateUI();
            document.getElementById('status').innerText = "● Sincronizado";
        } catch (e) {
            document.getElementById('status').innerText = "Erro ao carregar dados.";
        }
    }

    function updateUI() {
        const mes = document.getElementById('mesSelect').value;
        const conta = document.getElementById('contaSelect').value;
        const info = db.dados[mes][conta];
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        const nomes = { "C1": "Vida Vegetativa", "C2": "Contratos Continuados", "C3": "Manut/Cons Bens Imóveis", "C4": "Profesp" };
        document.getElementById('nomeConta').innerText = nomes[conta];
        
        document.getElementById('txtAnt').innerText = f(info.ant);
        document.getElementById('txtCred').innerText = f(info.cre);
        document.getElementById('txtUtil').innerText = f(info.uti);
        document.getElementById('txtAtu').innerText = f(info.atu);

        updateChart(conta);
    }

    function updateChart(contaId) {
        if (myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: db.meses,
                datasets: [
                    {
                        label: 'Crédito Recebido',
                        data: db.meses.map(m => db.dados[m][contaId].cre),
                        backgroundColor: '#00ff88',
                        borderRadius: 5
                    },
                    {
                        label: 'Valor Utilizado',
                        data: db.meses.map(m => db.dados[m][contaId].uti),
                        backgroundColor: '#ff4d4d',
                        borderRadius: 5
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#ffffff' } } },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892b0' } },
                    x: { ticks: { color: '#8892b0' } }
                }
            }
        });
    }

    document.getElementById('mesSelect').onchange = updateUI;
    document.getElementById('contaSelect').onchange = updateUI;
    loadData();
</script>
</body>
</html>
